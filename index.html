<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/colors.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <title>Calorie Counter</title>
</head>
<body>

  <button class="reset-btn" id="btnReset">Reset</button>

  <div class="header">
    <div class="available-label">Available Calories</div>
    <div class="available-calories" id="availableCalories">0</div>
    <div class="available-unit">kcal</div>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-value" id="burnedStat">0</div>
      <div class="stat-label">Burned</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="eatenStat">0</div>
      <div class="stat-label">Eaten</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="exerciseStat">0</div>
      <div class="stat-label">Exercise</div>
    </div>
  </div>

  <div class="burn-bar-container">
    <div class="burn-bar-label">
      <span>Day progress (midnight – midnight)</span>
      <span id="burnBarPct">0%</span>
    </div>
    <div class="burn-bar">
      <div class="burn-bar-fill" id="burnBarFill"></div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-food" id="btnFood">+ Food</button>
    <button class="btn btn-exercise" id="btnExercise">+ Exercise</button>
  </div>

  <div class="log-section">
    <div class="log-title">Today's Log</div>
    <div id="logEntries"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Add Food</div>
      <input type="text" id="entryName" placeholder="What did you eat?" autocomplete="off">
      <input type="number" id="entryCal" placeholder="Calories" inputmode="numeric">
      <div class="quick-picks" id="quickPicks"></div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="modalCancel">Cancel</button>
        <button class="modal-btn modal-btn-add" id="modalAddBtn">Add</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
