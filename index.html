<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/colors.css?v=20260406">
  <link rel="stylesheet" href="css/main.css?v=20260406">
  <link rel="stylesheet" href="css/components.css?v=20260406">
  <title>Calorie Counter</title>
</head>
<body>

  <!-- User Picker (shown on first launch or switch) -->
  <div class="user-picker active" id="userPicker">
    <div class="user-picker-inner">
      <h2 class="user-picker-title">Who's counting?</h2>
      <div id="loadingMsg" style="text-align:center;opacity:0.4;padding:20px">Loading...</div>
      <div id="userList"></div>
      <div class="user-picker-divider">or create new</div>
      <input type="text" id="newUserName" placeholder="Name" class="user-picker-input" autocomplete="off">
      <div class="picker-row">
        <select id="newUserGender" class="user-picker-input">
          <option value="" disabled selected>Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
        <input type="number" id="newUserAge" placeholder="Age" class="user-picker-input" inputmode="numeric">
      </div>
      <div class="picker-row">
        <input type="number" id="newUserWeight" placeholder="Weight (kg)" class="user-picker-input" inputmode="decimal">
        <input type="number" id="newUserHeight" placeholder="Height (cm)" class="user-picker-input" inputmode="numeric">
      </div>
      <select id="newUserActivity" class="user-picker-input">
        <option value="sedentary">Sedentary — avg &lt; 4k steps/day</option>
        <option value="light" selected>Lightly active — avg 4-7k steps/day</option>
        <option value="moderate">Moderately active — avg 7-10k steps/day</option>
        <option value="active">Active — avg 10-15k steps/day</option>
        <option value="very_active">Very active — avg 15k+ steps/day</option>
      </select>
      <input type="text" id="newUserPin" placeholder="PIN (optional)" class="user-picker-input" inputmode="numeric">
      <button class="btn btn-exercise" id="btnCreateUser" style="width:100%">Create</button>
    </div>
  </div>

  <!-- Main App -->
  <div id="appMain" style="display:none">

    <button class="switch-user-btn" id="btnSwitchUser"><span id="currentUserLabel"></span> ▾</button>
    <button class="profile-btn" id="btnProfile">Profile</button>

    <div class="live-period-tabs-container">
      <div class="history-period-tabs" id="livePeriodTabs">
        <button class="period-tab active" data-period="day">Day</button>
        <button class="period-tab" data-period="week">Week</button>
        <button class="period-tab" data-period="month">Month</button>
      </div>
    </div>

    <div class="header">
      <div class="available-label">Available Calories</div>
      <div class="available-calories" id="availableCalories">0</div>
      <div class="available-unit">kcal <span id="availableKg" style="opacity:0.4"></span></div>
      <div class="forecast" id="forecastCalories"></div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-value" id="burnedStat">0</div>
        <div class="stat-label">Burned</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="eatenStat">0</div>
        <div class="stat-label">Eaten</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="exerciseStat">0</div>
        <div class="stat-label">Exercise</div>
      </div>
    </div>

    <!-- Healthiness charts (only shown when feature enabled) -->
    <div id="healthChartsContainer" style="display:none">
      <div class="health-bar-container">
        <div class="health-chart-label">Food Healthiness</div>
        <div style="display:flex;align-items:center;gap:6px">
          <span id="healthLeftEmoji" style="font-size:18px;margin-top:-4px"></span>
          <div class="health-bar" id="healthBar" style="flex:1"></div>
          <span id="healthRightEmoji" style="font-size:18px;margin-top:-4px"></span>
        </div>
        <div class="health-legend" id="barLegend"></div>
        <div class="health-legend" id="barGoals" style="margin-top:4px"></div>
      </div>
    </div>


    <div class="actions">
      <button class="btn btn-food" id="btnFood">+ Food</button>
      <button class="btn btn-exercise" id="btnExercise">+ Exercise</button>
    </div>

    <div class="log-section">
      <div class="log-title">Today's Log</div>
      <div id="logEntries"></div>
    </div>

    <div class="history-link-container">
      <button class="history-link-btn" id="btnHistory">History</button>
      <button class="history-link-btn" id="btnWeight">Weight</button>
    </div>

    <!-- History View -->
    <div id="historyView" style="display:none">
      <div class="history-header">
        <button class="history-back-btn" id="btnHistoryBack">Today</button>
        <div class="history-period-tabs">
          <button class="period-tab active" data-period="day">Day</button>
          <button class="period-tab" data-period="week">Week</button>
          <button class="period-tab" data-period="month">Month</button>
          <button class="period-tab" data-period="all">All</button>
        </div>
      </div>

      <div class="history-nav-row" id="historyNavRow">
        <button class="history-nav-btn" id="btnPrevPeriod">&lsaquo;</button>
        <div class="history-date-label" id="historyDateLabel"></div>
        <button class="history-nav-btn" id="btnNextPeriod">&rsaquo;</button>
      </div>

      <div class="header" style="padding-top:10px">
        <div class="available-label">Net Calories</div>
        <div class="available-calories" id="historyNetCalories">0</div>
        <div class="available-unit">kcal</div>
        <div class="forecast" id="historySummaryLine"></div>
      </div>

      <div class="stats-row">
        <div class="stat">
          <div class="stat-value" id="historyBurnStat">0</div>
          <div class="stat-label">Daily Burn</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="historyEatenStat">0</div>
          <div class="stat-label">Eaten</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="historyExerciseStat">0</div>
          <div class="stat-label">Exercise</div>
        </div>
      </div>

      <!-- Healthiness charts for history view -->
      <div id="hist_healthChartsContainer" style="display:none">
        <div class="health-bar-container">
          <div class="health-chart-label">Food Healthiness</div>
          <div style="display:flex;align-items:center;gap:6px">
            <span id="hist_healthLeftEmoji" style="font-size:18px;margin-top:-4px"></span>
            <div class="health-bar" id="hist_healthBar" style="flex:1"></div>
            <span id="hist_healthRightEmoji" style="font-size:18px;margin-top:-4px"></span>
          </div>
          <div class="health-legend" id="hist_barLegend"></div>
          <div class="health-legend" id="hist_barGoals" style="margin-top:4px"></div>
        </div>
      </div>

      <div class="actions" id="historyActions">
        <button class="btn btn-food" id="btnHistoryFood">+ Food</button>
        <button class="btn btn-exercise" id="btnHistoryExercise">+ Exercise</button>
      </div>

      <div class="log-section">
        <div class="log-title" id="historyLogTitle">Entries</div>
        <div id="historyLogEntries"></div>
      </div>
    </div>

    <!-- Weight View -->
    <div id="weightView" style="display:none;overflow-x:hidden">
      <div class="history-header">
        <button class="history-back-btn" id="btnWeightBack">Today</button>
        <div style="font-size:16px;font-weight:600">Weight</div>
        <div style="width:50px"></div>
      </div>

      <div class="weight-input-row" style="padding-bottom:0">
        <input type="date" id="weightDate" class="weight-input" style="flex:1;min-width:0">
      </div>
      <div class="weight-input-row">
        <input type="number" step="0.1" id="weightInput" placeholder="kg" class="weight-input" autocomplete="off">
        <button class="weight-add-btn" id="btnAddWeight">+</button>
      </div>

      <div style="display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 16px 0">
        <div class="history-period-tabs" id="weightPeriodTabs">
          <button class="period-tab active" data-period="all">All</button>
          <button class="period-tab" data-period="month" id="weightMonthTab">Month</button>
        </div>
        <div id="weightMonthNav" style="display:none;align-items:center;gap:8px">
          <button class="history-nav-btn" id="btnWeightMonthPrev">&lsaquo;</button>
          <span id="weightMonthLabel" style="font-size:13px;min-width:90px;text-align:center;opacity:0.6"></span>
          <button class="history-nav-btn" id="btnWeightMonthNext">&rsaquo;</button>
        </div>
      </div>
      <div class="weight-chart-container">
        <svg id="weightChart" width="100%" height="200" preserveAspectRatio="none"></svg>
      </div>

      <div class="log-section">
        <div class="log-title">Weight Log</div>
        <div id="weightLogEntries"></div>
      </div>
    </div>

    <!-- Profile Modal -->
    <div class="modal-overlay" id="profileOverlay">
      <div class="modal">
        <div class="modal-title">Profile</div>
        <input type="text" id="profileName" placeholder="Name" autocomplete="off">
        <div class="picker-row">
          <select id="profileGender" class="modal-select">
            <option value="" disabled>Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
          <input type="number" id="profileAge" placeholder="Age" inputmode="numeric">
        </div>
        <div class="picker-row">
          <input type="number" id="profileWeight" placeholder="Weight (kg)" inputmode="decimal">
          <input type="number" id="profileHeight" placeholder="Height (cm)" inputmode="numeric">
        </div>
        <select id="profileActivity" class="modal-select" style="width:100%;padding:16px;border:2px solid var(--border-subtle);border-radius:12px;background:var(--bg-input);color:var(--text-primary);font-size:16px;margin-bottom:12px">
          <option value="sedentary">Sedentary — avg &lt; 4k steps/day</option>
          <option value="light">Lightly active — avg 4-7k steps/day</option>
          <option value="moderate">Moderately active — avg 7-10k steps/day</option>
          <option value="active">Active — avg 10-15k steps/day</option>
          <option value="very_active">Very active — avg 15k+ steps/day</option>
        </select>
        <div class="profile-burn-display" id="profileBurnDisplay"></div>
        <label class="profile-toggle">
          <input type="checkbox" id="profileHealthiness">
          <span>Track food healthiness</span>
        </label>
        <input type="number" id="profileWeeklyGoal" placeholder="Weekly weight loss goal (kg)" inputmode="decimal" step="0.1" style="width:100%;padding:16px;border:2px solid var(--border-subtle);border-radius:12px;background:var(--bg-input);color:var(--text-primary);font-size:16px;margin-bottom:12px">
        <div class="picker-row" id="healthGoalsRow" style="display:none">
          <input type="number" id="profileHealthyGoal" placeholder="Healthy+Good % goal" inputmode="numeric" min="0" max="100">
          <input type="number" id="profileJunkLimit" placeholder="Junk % max" inputmode="numeric" min="0" max="100">
        </div>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-cancel" id="profileCancel">Cancel</button>
          <button class="modal-btn modal-btn-add" id="profileSave">Save</button>
        </div>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-title" id="modalTitle">Add Food</div>
        <input type="text" id="entryName" placeholder="What did you eat?" autocomplete="off">
        <input type="number" id="entryCal" placeholder="Calories" inputmode="numeric">
        <div class="healthiness-picker" id="healthinessPicker" style="display:none">
          <span class="healthiness-label">Healthiness</span>
          <div class="healthiness-dots">
            <button class="health-dot health-dot-red" data-health="red"></button>
            <button class="health-dot health-dot-orange" data-health="orange"></button>
            <button class="health-dot health-dot-yellow" data-health="yellow"></button>
            <button class="health-dot health-dot-green" data-health="green"></button>
          </div>
        </div>
        <div class="quick-picks" id="quickPicks"></div>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-cancel" id="modalCancel">Cancel</button>
          <button class="modal-btn modal-btn-add" id="modalAddBtn">Add</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    window.onerror = function(msg, url, line) {
      document.getElementById('loadingMsg').innerHTML =
        '<span style="color:#e74c3c">Error: ' + msg + '<br>' + url + ':' + line + '</span>';
    };
    // Kill any old service workers immediately
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
    }
  </script>
  <script>
  (function() {
    'use strict';

    // ===== config =====
    var DAY_START_HOUR = 0;
    var GREEN_THRESHOLD = 600;
    function getGreenThreshold(days) {
      var weeklyGoal = (userProfile && userProfile.weekly_kg_goal) || 0;
      if (weeklyGoal > 0) return weeklyGoal * 1000 * (days || 1);
      return GREEN_THRESHOLD;
    }
    var API_URL = localStorage.getItem('api_url') || 'https://calorie-counter-api-production.up.railway.app';

    var FOOD_QUICK_PICKS = [
      { name: 'Coffee w/ milk', cal: 50 },
      { name: 'Banana', cal: 105 },
      { name: 'Sandwich', cal: 400 },
      { name: 'Salad', cal: 250 },
      { name: 'Rice & chicken', cal: 550 },
      { name: 'Pasta', cal: 600 },
      { name: 'Snack bar', cal: 200 },
      { name: 'Beer', cal: 150 },
    ];

    var EXERCISE_QUICK_PICKS = [
      { name: 'Walk 30 min', cal: 150 },
      { name: 'Run 30 min', cal: 350 },
      { name: 'Cycling 30 min', cal: 300 },
      { name: 'Gym session', cal: 400 },
      { name: 'Swimming 30 min', cal: 350 },
      { name: 'Yoga 30 min', cal: 120 },
    ];

    // ===== api =====
    async function apiRequest(path, options) {
      options = options || {};
      var res = await fetch(API_URL + path, Object.assign({ headers: { 'Content-Type': 'application/json' } }, options));
      if (!res.ok) {
        var err = await res.json().catch(function() { return { detail: res.statusText }; });
        throw new Error(err.detail || 'API error');
      }
      return res.json();
    }

    function apiListUsers() { return apiRequest('/api/users/'); }
    function apiGetUser(userId) { return apiRequest('/api/users/' + userId); }
    function apiSaveUser(userId, profile) {
      return apiRequest('/api/users/' + userId, { method: 'PUT', body: JSON.stringify(profile) });
    }
    function apiGetEntries(userId, date) { return apiRequest('/api/entries/' + userId + '/' + date); }
    function apiAddEntry(userId, entry) {
      return apiRequest('/api/entries/' + userId, { method: 'POST', body: JSON.stringify(entry) });
    }
    function apiDeleteEntry(userId, date, entryId) {
      return apiRequest('/api/entries/' + userId + '/' + date + '/' + entryId, { method: 'DELETE' });
    }
    function apiUpdateEntry(userId, date, entryId, updates) {
      return apiRequest('/api/entries/' + userId + '/' + date + '/' + entryId, {
        method: 'PATCH', body: JSON.stringify(updates)
      });
    }
    function apiListDates(userId) { return apiRequest('/api/entries/' + userId + '/dates'); }
    function apiGetEntriesRange(userId, start, end) {
      return apiRequest('/api/entries/' + userId + '/range/' + start + '/' + end);
    }
    function apiGetConfirmed(userId) { return apiRequest('/api/entries/' + userId + '/confirmed'); }
    function apiConfirmDay(userId, day) {
      return apiRequest('/api/entries/' + userId + '/confirm/' + day, { method: 'POST' });
    }
    function apiUnconfirmDay(userId, day) {
      return apiRequest('/api/entries/' + userId + '/confirm/' + day, { method: 'DELETE' });
    }
    function apiGetWeight(userId) { return apiRequest('/api/weight/' + userId); }
    function apiAddWeight(userId, date, kg) {
      return apiRequest('/api/weight/' + userId, {
        method: 'POST', body: JSON.stringify({ date: date, kg: kg })
      });
    }
    function apiDeleteWeight(userId, day) {
      return apiRequest('/api/weight/' + userId + '/' + day, { method: 'DELETE' });
    }

    // ===== state =====
    var entries = [];
    var currentUser = localStorage.getItem('current_user') || null;
    var userProfile = null;

    function getDayStart() {
      var now = new Date();
      var dayStart = new Date(now);
      dayStart.setHours(DAY_START_HOUR, 0, 0, 0);
      if (now < dayStart) dayStart.setDate(dayStart.getDate() - 1);
      return dayStart;
    }

    function getDayKey() {
      var d = getDayStart();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    function getCurrentUser() { return currentUser; }
    function getUserProfile() { return userProfile; }
    function getDailyBurn() { return (userProfile && userProfile.daily_burn) ? userProfile.daily_burn : 2200; }
    function getEntries() { return entries; }

    var viewingDate = null; // null = today, else 'YYYY-MM-DD'

    function getActiveDate() { return viewingDate || getDayKey(); }
    function isViewingToday() { return !viewingDate || viewingDate === getDayKey(); }

    async function setCurrentUser(userId) {
      currentUser = userId;
      localStorage.setItem('current_user', userId);
      entries = [];
      liveEntries = [];
      userProfile = null;
      userProfile = await apiGetUser(userId);
      await loadLiveEntries();
    }

    async function loadEntries() {
      if (!currentUser) { entries = []; liveEntries = []; return; }
      try { entries = await apiGetEntries(currentUser, getActiveDate()); }
      catch(e) { entries = []; }
      if (livePeriod === 'day') liveEntries = entries;
    }

    async function addEntryToState(type, name, cal, healthiness) {
      var date = getActiveDate();
      var time = isViewingToday() ? new Date().toISOString() : date + 'T12:00:00';
      var entry = { type: type, name: name, cal: cal, time: time };
      if (healthiness) entry.healthiness = healthiness;
      var saved = await apiAddEntry(currentUser, entry);
      entries.push(saved);
    }

    async function deleteEntryFromState(entryId) {
      await apiDeleteEntry(currentUser, getActiveDate(), entryId);
      entries = entries.filter(function(e) { return e.id !== entryId; });
    }

    async function clearAllEntries() {
      var day = getActiveDate();
      await Promise.all(entries.map(function(e) { return apiDeleteEntry(currentUser, day, e.id); }));
      entries = [];
    }

    function getTotals() {
      var eaten = 0, exercise = 0;
      entries.forEach(function(e) {
        if (e.type === 'food') eaten += e.cal;
        else exercise += e.cal;
      });
      return { eaten: eaten, exercise: exercise };
    }

    // ===== live period =====
    var livePeriod = 'day'; // day, week, month
    var liveEntries = []; // entries for the current live period (may be more than today)

    async function loadLiveEntries() {
      if (!currentUser) { entries = []; liveEntries = []; return; }
      try {
        entries = await apiGetEntries(currentUser, getDayKey());
      } catch(e) { entries = []; }

      if (livePeriod === 'day') {
        liveEntries = entries;
      } else {
        var range = getPeriodRange(getDayKey(), livePeriod);
        try {
          liveEntries = await apiGetEntriesRange(currentUser, range.start, range.end);
        } catch(e) { liveEntries = entries; }
      }
    }

    function setLivePeriod(period) {
      livePeriod = period;
      document.querySelectorAll('#livePeriodTabs .period-tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.period === period);
      });
      loadLiveEntries().then(refresh);
    }

    // ===== burn =====
    function getBurnedSoFar() {
      var now = new Date();
      var dayStart = getDayStart();
      var dayEnd = new Date(dayStart);
      dayEnd.setDate(dayEnd.getDate() + 1);
      var elapsed = now - dayStart;
      var total = dayEnd - dayStart;
      var fraction = Math.min(elapsed / total, 1);
      return { burned: Math.floor(getDailyBurn() * fraction), fraction: fraction };
    }

    function getLivePeriodDays() {
      if (livePeriod === 'day') return 0; // use live burn for day
      var range = getPeriodRange(getDayKey(), livePeriod);
      var s = new Date(range.start + 'T12:00:00');
      var today = new Date(getDayKey() + 'T12:00:00');
      return Math.round((today - s) / 86400000); // completed days before today
    }

    // ===== ui =====
    function escapeHtml(text) {
      var d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function updateDisplay() {
      var burn = getBurnedSoFar();
      var liveTotals = { eaten: 0, exercise: 0 };
      liveEntries.forEach(function(e) {
        if (e.type === 'food') liveTotals.eaten += e.cal;
        else liveTotals.exercise += e.cal;
      });

      var totalBurned;
      var forecastBurn;
      if (livePeriod === 'day') {
        totalBurned = burn.burned;
        forecastBurn = getDailyBurn();
      } else {
        var completedDays = getLivePeriodDays();
        totalBurned = (completedDays * getDailyBurn()) + burn.burned;
        // Forecast = total burn for the entire period (all days)
        var range = getPeriodRange(getDayKey(), livePeriod);
        var rangeStart = new Date(range.start + 'T12:00:00');
        var rangeEnd = new Date(range.end + 'T12:00:00');
        var totalDaysInPeriod = Math.round((rangeEnd - rangeStart) / 86400000) + 1;
        forecastBurn = totalDaysInPeriod * getDailyBurn();
      }

      var available = totalBurned - liveTotals.eaten + liveTotals.exercise;

      // Calculate green threshold based on weekly goal
      var weeklyGoal = (userProfile && userProfile.weekly_kg_goal) || 0;
      var greenThreshold;
      if (weeklyGoal > 0) {
        var dailyDeficit = weeklyGoal * 1000; // kcal deficit per day
        if (livePeriod === 'day') {
          greenThreshold = dailyDeficit;
        } else {
          var range2 = getPeriodRange(getDayKey(), livePeriod);
          var rs = new Date(range2.start + 'T12:00:00');
          var re = new Date(range2.end + 'T12:00:00');
          var periodDays = Math.round((re - rs) / 86400000) + 1;
          greenThreshold = dailyDeficit * periodDays;
        }
      } else {
        greenThreshold = GREEN_THRESHOLD;
      }

      var el = document.getElementById('availableCalories');
      el.textContent = Math.round(available);
      el.className = 'available-calories';
      if (available < 0) el.classList.add('color-red');
      else if (available < greenThreshold) el.classList.add('color-yellow');
      else el.classList.add('color-green');

      var kgEl = document.getElementById('availableKg');
      if (kgEl) {
        var kg = available / 7000;
        var sign = kg >= 0 ? '-' : '+';
        kgEl.textContent = '(' + sign + Math.abs(kg).toFixed(2) + ' kg)';
        kgEl.style.color = kg >= 0 ? 'var(--color-green)' : 'var(--color-red)';
        kgEl.style.opacity = '1';
      }

      var forecast = forecastBurn - liveTotals.eaten + liveTotals.exercise;
      var forecastEl = document.getElementById('forecastCalories');
      if (forecastEl) {
        var forecastText;
        if (livePeriod === 'day') {
          forecastText = forecast + ' by midnight';
        } else {
          var range = getPeriodRange(getDayKey(), livePeriod);
          var endDate = new Date(range.end + 'T12:00:00');
          forecastText = forecast + ' by ' + endDate.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        }
        if (weeklyGoal > 0) forecastText += '  ·  green over ' + Math.round(greenThreshold);
        forecastEl.textContent = forecastText;
      }

    function healthPickerHtml(entry) {

    function updateHealthCharts(ents, prefix) {
      prefix = prefix || '';
      var container = document.getElementById(prefix + 'healthChartsContainer');
      if (!userProfile || !userProfile.track_healthiness) {
        container.style.display = 'none';
        return;
      }

      // Count ALL food calories, untagged goes to 'none'
      var cats = { green: 0, yellow: 0, orange: 0, red: 0, none: 0 };
      var total = 0;
      ents.forEach(function(e) {
        if (e.type === 'food') {
          if (e.healthiness && cats.hasOwnProperty(e.healthiness)) {
            cats[e.healthiness] += e.cal;
          } else {
            cats.none += e.cal;
          }
          total += e.cal;
        }
      });

      if (total === 0) {
        container.style.display = 'none';
        return;
      }

      container.style.display = 'flex';

      var colors = {
        green: 'var(--color-green)',
        yellow: '#5bc0de',
        orange: '#f1c40f',
        red: 'var(--color-red)',
        none: 'var(--border-subtle)'
      };
      var labels = { green: 'Healthy', yellow: 'Good pick', orange: 'Comfort', red: 'Junk', none: 'Unrated' };
      var order = ['green', 'yellow', 'orange', 'red', 'none'];

      // Calculate percentages
      var pcts = {};
      order.forEach(function(k) { pcts[k] = total > 0 ? (cats[k] / total) * 100 : 0; });

      // --- Stacked bar (red starts from left) ---
      var barHtml = '';
      order.forEach(function(k) {
        if (pcts[k] > 0) {
          barHtml += '<div class="health-bar-seg" style="width:' + pcts[k] + '%;background:' + colors[k] + '"></div>';
        }
      });
      document.getElementById(prefix + 'healthBar').innerHTML = barHtml;

      // --- Legend (category percentages) ---
      var legendHtml = '';
      order.forEach(function(k) {
        if (cats[k] > 0) {
          legendHtml += '<span class="health-legend-item"><span class="health-legend-dot" style="background:' + colors[k] + '"></span>' +
            labels[k] + ' ' + Math.round(pcts[k]) + '%</span>';
        }
      });

      // --- Goal status + emojis (only when no unrated entries) ---
      var hasUnrated = cats.none > 0;
      var healthyGoal = (userProfile && userProfile.healthy_goal_pct) || 0;
      var junkLimit = (userProfile && userProfile.junk_limit_pct) || 0;
      var leftEmoji = '', leftColor = '';
      var rightEmoji = '', rightColor = '';
      var goalsHtml = '';

      if (!hasUnrated && (healthyGoal > 0 || junkLimit > 0)) {
        var healthyPct = Math.round(pcts.green + pcts.yellow);
        var junkPct = Math.round(pcts.red);
        var NEAR = 5;
        if (healthyGoal > 0) {
          var hColor, hEmoji;
          var hDiff = healthyPct - healthyGoal;
          if (Math.abs(hDiff) <= NEAR) { hColor = 'var(--color-yellow)'; hEmoji = '😐'; }
          else if (hDiff > 0) { hColor = 'var(--color-green)'; hEmoji = '😊'; }
          else { hColor = 'var(--color-red)'; hEmoji = '😞'; }
          leftEmoji = hEmoji;
          leftColor = hColor;
          goalsHtml += '<span class="health-legend-item" style="color:' + hColor + '">' +
            'Healthy+Good ' + healthyPct + '/' + healthyGoal + '%</span>';
        }
        if (junkLimit > 0) {
          var jColor, jEmoji;
          var jDiff = junkPct - junkLimit;
          if (Math.abs(jDiff) <= NEAR) { jColor = 'var(--color-yellow)'; jEmoji = '😐'; }
          else if (jDiff < 0) { jColor = 'var(--color-green)'; jEmoji = '😊'; }
          else { jColor = 'var(--color-red)'; jEmoji = '😠'; }
          rightEmoji = jEmoji;
          rightColor = jColor;
          goalsHtml += '<span class="health-legend-item" style="color:' + jColor + '">' +
            'Junk ' + junkPct + '/' + junkLimit + '%</span>';
        }
      }

      var leftEl = document.getElementById(prefix + 'healthLeftEmoji');
      var rightEl = document.getElementById(prefix + 'healthRightEmoji');
      leftEl.textContent = leftEmoji;
      rightEl.textContent = rightEmoji;
      var glowStyle = function(c) { return c ? '0 0 6px ' + c + ', 0 0 12px ' + c : 'none'; };
      leftEl.style.textShadow = glowStyle(leftColor);
      rightEl.style.textShadow = glowStyle(rightColor);
      document.getElementById(prefix + 'barLegend').innerHTML = legendHtml;
      document.getElementById(prefix + 'barGoals').innerHTML = goalsHtml;
    }

    function updateBurnDisplay() {
      var gender = document.getElementById('profileGender').value;
      var age = parseInt(document.getElementById('profileAge').value) || 0;
      var weight = parseFloat(document.getElementById('profileWeight').value) || 0;
      var height = parseFloat(document.getElementById('profileHeight').value) || 0;
      var activity = document.getElementById('profileActivity').value;

      if (!gender || !age || !weight || !height) {
        display.textContent = 'Fill in all fields to calculate daily burn';
        display.style.color = 'var(--text-muted)';
        return;
      }
      var bmr = 10 * weight + 6.25 * height - 5 * age;
      bmr += gender === 'male' ? 5 : -161;
      var multiplier = ACTIVITY_MULTIPLIERS[activity] || 1.375;
      var tdee = Math.round(bmr * multiplier);
      var activityLabels = { sedentary: 'sedentary', light: 'lightly active', moderate: 'moderately active', active: 'active', very_active: 'very active' };
      var label = activityLabels[activity] || activity;
      display.innerHTML = '<div style="font-size:36px;font-weight:200;margin-bottom:4px">' + tdee +
        ' <span style="font-size:16px">kcal/day</span></div><div style="font-size:12px;opacity:0.6">BMR ' +
        Math.round(bmr) + ' \u00d7 ' + multiplier + ' (' + label + ')</div>';
      display.style.color = 'var(--color-green)';
    }

    function formatDateLabel(dateStr) {
      var d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function formatPeriodLabel(dateStr, period) {
      if (period === 'day') return formatDateLabel(dateStr);
      var range = getPeriodRange(dateStr, period);
      if (period === 'all') return 'All Time';
      var s = new Date(range.start + 'T12:00:00');
      var e = new Date(range.end + 'T12:00:00');
      if (period === 'week') {
        return s.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' \u2013 ' +
               e.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      }
      return s.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
    }

    function dateAdd(dateStr, days) {
      var d = new Date(dateStr + 'T12:00:00');
      d.setDate(d.getDate() + days);
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function getPeriodRange(dateStr, period) {
      if (period === 'day') return { start: dateStr, end: dateStr };
      if (period === 'all') return { start: '2020-01-01', end: getDayKey() };
      var d = new Date(dateStr + 'T12:00:00');
      if (period === 'week') {
        var dayOfWeek = d.getDay();
        var monday = new Date(d);
        monday.setDate(d.getDate() - ((dayOfWeek + 6) % 7));
        var sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        var fmt = function(dt) { return dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0'); };
        return { start: fmt(monday), end: fmt(sunday) };
      }
      // month
      var first = new Date(d.getFullYear(), d.getMonth(), 1);
      var last = new Date(d.getFullYear(), d.getMonth() + 1, 0);
      var fmt2 = function(dt) { return dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0'); };
      return { start: fmt2(first), end: fmt2(last) };
    }

    function navigatePeriod(offset) {
      var d = viewingDate || getDayKey();
      if (historyPeriod === 'day') {
        d = dateAdd(d, offset);
      } else if (historyPeriod === 'week') {
        d = dateAdd(d, offset * 7);
      } else if (historyPeriod === 'month') {
        var dt = new Date(d + 'T12:00:00');
        dt.setMonth(dt.getMonth() + offset);
        d = dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0');
      }
      // Don't navigate into the future
      if (d > getDayKey()) d = getDayKey();
      viewingDate = d;
      loadHistoryView();
    }

    async function loadHistoryView() {
      var range = getPeriodRange(viewingDate || getDayKey(), historyPeriod);
      var dateLabel = document.getElementById('historyDateLabel');
      dateLabel.textContent = formatPeriodLabel(viewingDate || getDayKey(), historyPeriod);

      // Red date label when viewing past
      var isPast = historyPeriod === 'day' && range.start !== getDayKey();
      dateLabel.style.color = isPast ? 'var(--color-red)' : '';

      // Back button: show "Today" to return, or the date if viewing today in day mode
      var backBtn = document.getElementById('btnHistoryBack');
      backBtn.textContent = '\u2190 Today';

      // Hide nav row for 'all'
      document.getElementById('historyNavRow').style.display = historyPeriod === 'all' ? 'none' : 'flex';

      // Disable next if at today
      var todayRange = getPeriodRange(getDayKey(), historyPeriod);
      document.getElementById('btnNextPeriod').disabled = (range.end >= todayRange.end);

      // Show add buttons only for day view
      document.getElementById('historyActions').style.display = historyPeriod === 'day' ? 'flex' : 'none';

      // Load entries and confirmed days
      if (historyPeriod === 'day') {
        viewingDate = range.start;
        try {
          var dayResults = await Promise.all([
            apiGetEntries(currentUser, range.start),
            apiGetConfirmed(currentUser)
          ]);
          entries = dayResults[0];
          confirmedDays = dayResults[1];
        } catch(e) { entries = []; }
        historyEntries = entries;
      } else {
        try {
          var results = await Promise.all([
            apiGetEntriesRange(currentUser, range.start, range.end),
            apiGetConfirmed(currentUser)
          ]);
          historyEntries = results[0];
          confirmedDays = results[1];
        } catch(e) { historyEntries = []; confirmedDays = []; }
      }

      updateHistoryDisplay();
    }

    function groupEntriesByDay(entries) {
      var map = {};
      entries.forEach(function(e) {
        var day = e.time.slice(0, 10);
        if (!map[day]) map[day] = [];
        map[day].push(e);
      });
      return map;
    }

    function getDaysInRange(start, end) {
      var days = [];
      var today = getDayKey();
      var d = end > today ? today : end;
      while (d >= start) {
        days.push(d);
        d = dateAdd(d, -1);
      }
      return days;
    }

    function updateHistoryDisplay() {
      var eaten = 0, exercise = 0;
      historyEntries.forEach(function(e) {
        if (e.type === 'food') eaten += e.cal;
        else exercise += e.cal;
      });

      var burn = getDailyBurn();
      var days = 1;
      if (historyPeriod !== 'day') {
        var range = getPeriodRange(viewingDate || getDayKey(), historyPeriod);
        var s = new Date(range.start + 'T12:00:00');
        var e = new Date(range.end + 'T12:00:00');
        days = Math.round((e - s) / 86400000) + 1;
        var today = new Date(getDayKey() + 'T12:00:00');
        if (e > today) {
          days = Math.round((today - s) / 86400000) + 1;
        }
        if (days < 1) days = 1;
      }

      var totalBurn = burn * days;
      var net = totalBurn - eaten + exercise;

      var netEl = document.getElementById('historyNetCalories');
      netEl.textContent = Math.round(net);
      netEl.className = 'available-calories';

      var activeDay = viewingDate || getDayKey();
      var viewingToday = activeDay === getDayKey();
      var isConfirmed = confirmedDays.indexOf(activeDay) !== -1;
      var isTrackedDay = historyEntries.length > 0 && (eaten >= LOW_TRACK_THRESHOLD || isConfirmed);

      if (historyPeriod === 'day' && !viewingToday && !isTrackedDay) {
        // Grey for untracked/incomplete past days
        netEl.style.color = 'var(--text-ghost)';
      } else {
        netEl.style.color = '';
        if (net < 0) netEl.classList.add('color-red');
        else if (net < getGreenThreshold(1)) netEl.classList.add('color-yellow');
        else netEl.classList.add('color-green');
      }

      document.getElementById('historyBurnStat').textContent = totalBurn;
      document.getElementById('historyEatenStat').textContent = eaten;
      document.getElementById('historyExerciseStat').textContent = exercise;

      var summary = historyPeriod === 'day'
        ? (totalBurn + ' burn \u2013 ' + eaten + ' eaten + ' + exercise + ' exercise')
        : (days + ' days \u00b7 avg ' + Math.round(eaten / days) + ' eaten/day');
      document.getElementById('historySummaryLine').textContent = summary;

      updateHealthCharts(historyEntries, 'hist_');

      var container = document.getElementById('historyLogEntries');

      // Day view: show individual entries
      if (historyPeriod === 'day') {
        var activeDay = viewingDate || getDayKey();
        var isEditingToday = activeDay === getDayKey();
        document.getElementById('historyLogTitle').textContent = isEditingToday
          ? 'Today\'s Entries'
          : formatDateLabel(activeDay) + ' \u2014 Entries';
        if (historyEntries.length === 0) {
          container.innerHTML = '<div class="empty-log">No entries</div>';
          return;
        }
        var sorted = historyEntries.slice().reverse();
        container.innerHTML = sorted.map(function(e) {
          var sign = e.type === 'food' ? '-' : '+';
          var cls = e.type === 'food' ? 'food' : 'exercise';
          var d = new Date(e.time);
          var timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          return '<div class="log-entry"><div class="log-entry-info"><div class="log-entry-name">' +
            healthDotHtml(e) + escapeHtml(e.name) + '</div><div class="log-entry-time">' + timeStr +
            '</div></div><div style="display:flex;align-items:center"><div class="log-entry-cal ' +
            cls + '">' + sign + e.cal + '</div><button class="log-entry-delete" data-id="' +
            e.id + '">\u00d7</button></div></div>';
        }).join('');
        container.querySelectorAll('.log-entry-delete').forEach(function(btn) {
          btn.addEventListener('click', async function() {
            await deleteEntryFromState(btn.dataset.id);
            historyEntries = entries;
            updateHistoryDisplay();
          });
        });
        return;
      }

      // Week/month/all view: show day-by-day cards
      document.getElementById('historyLogTitle').textContent = 'Days';
      var range = getPeriodRange(viewingDate || getDayKey(), historyPeriod);
      var allDays = getDaysInRange(range.start, range.end);
      var byDay = groupEntriesByDay(historyEntries);

      container.innerHTML = allDays.map(function(day) {
        var dayEntries = byDay[day] || [];
        var dayEaten = 0;
        dayEntries.forEach(function(e) { if (e.type === 'food') dayEaten += e.cal; });
        var isConfirmed = confirmedDays.indexOf(day) !== -1;
        var isToday = day === getDayKey();

        var dayExercise = 0;
        dayEntries.forEach(function(e) { if (e.type !== 'food') dayExercise += e.cal; });
        var dayNet = getDailyBurn() - dayEaten + dayExercise;
        var isTracked = dayEntries.length > 0 && (dayEaten >= LOW_TRACK_THRESHOLD || isConfirmed);

        var status, statusClass;
        if (isToday) {
          status = 'today';
          statusClass = 'day-card-today';
        } else if (!isTracked) {
          // No entries or below threshold and not confirmed = grey
          status = dayEntries.length === 0 ? 'empty' : 'low';
          statusClass = 'day-card-grey';
        } else if (dayNet < 0) {
          status = 'tracked';
          statusClass = 'day-card-red';
        } else if (dayNet < getGreenThreshold(1)) {
          status = 'tracked';
          statusClass = 'day-card-yellow';
        } else {
          status = 'tracked';
          statusClass = 'day-card-ok';
        }

        var d = new Date(day + 'T12:00:00');
        var label = d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
        var kcalText;
        if (dayEntries.length === 0) {
          kcalText = 'No entries';
        } else if (isTracked) {
          kcalText = (dayNet >= 0 ? '+' : '') + dayNet + ' net';
        } else {
          kcalText = dayEaten + ' kcal eaten';
        }

        var html = '<div class="day-card ' + statusClass + '" data-day="' + day + '">';
        html += '<div class="day-card-info">';
        html += '<div class="day-card-date">' + label + '</div>';
        html += '<div class="day-card-kcal">' + kcalText + '</div>';
        html += '</div>';
        html += '<div class="day-card-actions">';
        if (status === 'low') {
          html += '<button class="day-card-ok-btn" data-day="' + day + '">OK?</button>';
        }
        if (isConfirmed) {
          html += '<button class="day-card-undo-btn" data-day="' + day + '">\u2713</button>';
        }
        if (!isToday) {
          html += '<span class="day-card-arrow">\u203A</span>';
        }
        html += '</div></div>';
        return html;
      }).join('');

      // Click day card to navigate to that day
      container.querySelectorAll('.day-card[data-day]').forEach(function(card) {
        card.addEventListener('click', function(e) {
          if (e.target.classList.contains('day-card-ok-btn')) return;
          var day = card.dataset.day;
          if (day === getDayKey()) return;
          viewingDate = day;
          setPeriod('day');
        });
      });

      // OK button to confirm a day
      container.querySelectorAll('.day-card-ok-btn').forEach(function(btn) {
        btn.addEventListener('click', async function(e) {
          e.stopPropagation();
          var day = btn.dataset.day;
          await apiConfirmDay(currentUser, day);
          confirmedDays.push(day);
          updateHistoryDisplay();
        });
      });

      // Undo button to unconfirm a day
      container.querySelectorAll('.day-card-undo-btn').forEach(function(btn) {
        btn.addEventListener('click', async function(e) {
          e.stopPropagation();
          var day = btn.dataset.day;
          await apiUnconfirmDay(currentUser, day);
          confirmedDays = confirmedDays.filter(function(d) { return d !== day; });
          updateHistoryDisplay();
        });
      });
    }

    async function renderWeightChart() {
      var svg = document.getElementById('weightChart');
      function parseLocalDate(s) { var p = s.split('-'); return new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2])); }

      // Filter entries by selected period
      // Determine the X axis window based on period
      var today = new Date(); today.setHours(0,0,0,0);
      var periodStart, periodEnd = today;
      if (weightChartPeriod === 'month') {
        var m = getWeightMonth();
        periodStart = new Date(m.getFullYear(), m.getMonth(), 1);
        periodEnd = new Date(m.getFullYear(), m.getMonth() + 1, 0); // last day of month
        if (periodEnd > today) periodEnd = today;
      } else {
        // all time: span from first to last entry
        periodStart = weightEntries.length > 0 ? parseLocalDate(weightEntries[0].date) : today;
        periodEnd = weightEntries.length > 0 ? parseLocalDate(weightEntries[weightEntries.length - 1].date) : today;
        if (periodEnd < today) periodEnd = today;
      }

      var filtered = weightEntries.filter(function(e) {
        var d = parseLocalDate(e.date);
        return d >= periodStart && d <= periodEnd;
      });

      // Find the most recent weight entry before the period (for calculated starting point)
      var seedWeight = null;
      for (var si = weightEntries.length - 1; si >= 0; si--) {
        if (parseLocalDate(weightEntries[si].date) < periodStart) {
          seedWeight = weightEntries[si].kg;
          break;
        }
      }
      if (seedWeight === null && filtered.length > 0) seedWeight = filtered[0].kg;

      if (filtered.length < 2 && seedWeight === null) {
        svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="14">Need at least 2 entries for chart</text>';
        return;
      }

      var w = svg.clientWidth || 300;
      var h = 200;
      var pad = { top: 20, right: 16, bottom: 30, left: 40 };
      var cw = w - pad.left - pad.right;
      var ch = h - pad.top - pad.bottom;

      var firstDate = periodStart;
      var lastDate = periodEnd;
      var dateRange = lastDate - firstDate || 1;
      function toDateStr(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
      var firstDateStr = toDateStr(firstDate);
      var lastDateStr = toDateStr(lastDate);

      // Fetch calorie entries for the date range to calculate predicted weight
      var calEntries = [];
      try {
        calEntries = await apiGetEntriesRange(currentUser, firstDateStr, lastDateStr);
      } catch(e) {}

      // Group calorie entries by day: net = eaten - exercise
      var calByDay = {};
      calEntries.forEach(function(e) {
        var day = e.time.slice(0, 10);
        if (!calByDay[day]) calByDay[day] = { eaten: 0, exercise: 0 };
        if (e.type === 'food') calByDay[day].eaten += e.cal;
        else calByDay[day].exercise += e.cal;
      });

      // Build predicted weight day by day from first weigh-in (up to today)
      var dailyBurn = getDailyBurn();
      var predicted = [];
      var calcWeight = seedWeight;
      var ydKey = getDayKey();
      var ydParts = ydKey.split('-');
      var yesterday = new Date(parseInt(ydParts[0]), parseInt(ydParts[1]) - 1, parseInt(ydParts[2]) - 1);
      var predEnd = lastDate < yesterday ? lastDate : yesterday;
      var d = new Date(firstDate.getTime());
      while (d <= predEnd) {
        var dayStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        var dayData = calByDay[dayStr];
        if (dayData) {
          var netSurplus = dayData.eaten - dayData.exercise - dailyBurn;
          calcWeight += netSurplus / 7000;
          predicted.push({ date: dayStr, kg: calcWeight });
        }
        d.setDate(d.getDate() + 1);
      }

      // Determine Y range from both actual and predicted
      var allKgs = filtered.map(function(e) { return e.kg; })
        .concat(predicted.map(function(e) { return e.kg; }));
      var minKg = Math.floor(Math.min.apply(null, allKgs) - 0.5);
      var maxKg = Math.ceil(Math.max.apply(null, allKgs) + 0.5);
      if (maxKg - minKg < 2) { minKg -= 1; maxKg += 1; }

      function x(dt) { return pad.left + ((parseLocalDate(dt) - firstDate) / dateRange) * cw; }
      function y(kg) { return pad.top + ch - ((kg - minKg) / (maxKg - minKg)) * ch; }

      var html = '';

      // Grid lines (1 kg steps)
      for (var kg = minKg; kg <= maxKg; kg++) {
        var yy = y(kg);
        html += '<line x1="' + pad.left + '" y1="' + yy + '" x2="' + (w - pad.right) + '" y2="' + yy + '" stroke="rgba(255,255,255,0.06)" />';
        html += '<text x="' + (pad.left - 6) + '" y="' + (yy + 4) + '" text-anchor="end" fill="rgba(255,255,255,0.3)" font-size="11">' + kg + '</text>';
      }

      // Date labels — evenly spaced across the period window
      var numLabels = 3;
      for (var li = 0; li < numLabels; li++) {
        var labelTime = firstDate.getTime() + (dateRange * li / (numLabels - 1));
        var labelDate = new Date(labelTime);
        var labelStr = toDateStr(labelDate);
        var label = labelDate.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        html += '<text x="' + x(labelStr) + '" y="' + (h - 4) + '" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11">' + label + '</text>';
      }

      var green = getComputedStyle(document.documentElement).getPropertyValue('--color-green').trim();
      var yellow = getComputedStyle(document.documentElement).getPropertyValue('--color-yellow').trim();

      // --- Layer 1: 7-day moving averages (behind everything) ---
      // Actual MA
      var actPoints = filtered.map(function(e) { return x(e.date) + ',' + y(e.kg); }).join(' ');
      if (filtered.length >= 7) {
        var maPoints = [];
        for (var j = 0; j < filtered.length; j++) {
          var s = Math.max(0, j - 6);
          var sum = 0;
          for (var k = s; k <= j; k++) sum += filtered[k].kg;
          maPoints.push(x(filtered[j].date) + ',' + y(sum / (j - s + 1)));
        }
        html += '<polyline points="' + maPoints.join(' ') + '" fill="none" stroke="' + green + '" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.5" />';
      }

      // --- Layer 2: thin lines + dots on top ---
      // Predicted thin line
      var predLinePoints = predicted.map(function(e) { return x(e.date) + ',' + y(e.kg); }).join(' ');
      html += '<polyline points="' + predLinePoints + '" fill="none" stroke="' + yellow + '" stroke-width="1" stroke-linejoin="round" opacity="0.3" />';

      // Build lookup of actual weights by date for overlap detection
      var actualByDate = {};
      filtered.forEach(function(e) { actualByDate[e.date] = e.kg; });

      // Predicted dots + tap targets
      predicted.forEach(function(e) {
        var actual = actualByDate[e.date];
        var overlaps = actual !== undefined && actual.toFixed(1) === e.kg.toFixed(1);
        if (overlaps) {
          html += '<circle cx="' + x(e.date) + '" cy="' + y(e.kg) + '" r="5" fill="none" stroke="' + yellow + '" stroke-width="1.5" />';
        } else {
          html += '<circle cx="' + x(e.date) + '" cy="' + y(e.kg) + '" r="3" fill="' + yellow + '" opacity="0.5" />';
        }
        var dl = new Date(e.date + 'T00:00:00');
        var label = dl.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ': ' + e.kg.toFixed(1) + ' kg (calc)';
        html += '<circle cx="' + x(e.date) + '" cy="' + y(e.kg) + '" r="10" fill="transparent" class="weight-tap" data-label="' + label + '" data-x="' + x(e.date) + '" data-y="' + y(e.kg) + '" />';
      });

      // Actual thin line
      html += '<polyline points="' + actPoints + '" fill="none" stroke="' + green + '" stroke-width="1" stroke-linejoin="round" opacity="0.3" />';

      // Actual dots + tap targets
      filtered.forEach(function(e) {
        html += '<circle cx="' + x(e.date) + '" cy="' + y(e.kg) + '" r="3" fill="' + green + '" opacity="0.5" />';
        var dl = new Date(e.date + 'T00:00:00');
        var label = dl.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ': ' + e.kg.toFixed(1) + ' kg';
        html += '<circle cx="' + x(e.date) + '" cy="' + y(e.kg) + '" r="10" fill="transparent" class="weight-tap" data-label="' + label + '" data-x="' + x(e.date) + '" data-y="' + y(e.kg) + '" />';
      });

      // Tooltip (hidden initially)
      html += '<g id="weightTooltip" style="display:none">';
      html += '<rect id="ttBg" rx="6" ry="6" fill="rgba(0,0,0,0.8)" />';
      html += '<text id="ttText" fill="white" font-size="12" text-anchor="middle"></text>';
      html += '</g>';

      // Legend
      html += '<circle cx="' + (pad.left + 4) + '" cy="' + (h - 4) + '" r="4" fill="' + green + '" />';
      html += '<text x="' + (pad.left + 12) + '" y="' + (h - 1) + '" fill="rgba(255,255,255,0.4)" font-size="9">Actual</text>';
      html += '<circle cx="' + (pad.left + 58) + '" cy="' + (h - 4) + '" r="4" fill="' + yellow + '" />';
      html += '<text x="' + (pad.left + 72) + '" y="' + (h - 1) + '" fill="rgba(255,255,255,0.4)" font-size="9">Calculated</text>';

      svg.innerHTML = html;

      // Wire up tap/hover on data points
      svg.querySelectorAll('.weight-tap').forEach(function(circle) {
        function showTip() {
          var tt = document.getElementById('weightTooltip');
          var ttText = document.getElementById('ttText');
          var ttBg = document.getElementById('ttBg');
          var cx = parseFloat(circle.dataset.x);
          var cy = parseFloat(circle.dataset.y);
          ttText.textContent = circle.dataset.label;
          ttText.setAttribute('x', cx);
          ttText.setAttribute('y', cy - 14);
          var bbox = ttText.getBBox();
          ttBg.setAttribute('x', bbox.x - 6);
          ttBg.setAttribute('y', bbox.y - 3);
          ttBg.setAttribute('width', bbox.width + 12);
          ttBg.setAttribute('height', bbox.height + 6);
          tt.style.display = '';
        }
        circle.addEventListener('click', showTip);
        circle.addEventListener('mouseenter', showTip);
      });
      svg.addEventListener('mouseleave', function() {
        document.getElementById('weightTooltip').style.display = 'none';
      });
    }

    function renderWeightLog() {
      var container = document.getElementById('weightLogEntries');
      if (weightEntries.length === 0) {

        });
        document.getElementById('btnHistoryFood').addEventListener('click', function() { openModal('food'); });
        document.getElementById('btnHistoryExercise').addEventListener('click', function() { openModal('exercise'); });

        // Weight
        document.getElementById('btnWeight').addEventListener('click', showWeight);
        document.getElementById('btnWeightBack').addEventListener('click', hideWeight);
        document.getElementById('btnAddWeight').addEventListener('click', handleAddWeight);
        document.getElementById('weightPeriodTabs').querySelectorAll('.period-tab').forEach(function(tab) {
          tab.addEventListener('click', function() {
            document.getElementById('weightPeriodTabs').querySelectorAll('.period-tab').forEach(function(t) { t.classList.remove('active'); });
            tab.classList.add('active');
            weightChartPeriod = tab.dataset.period;
            weightMonthOffset = 0;
            updateWeightMonthLabel();
            document.getElementById('weightMonthNav').style.display = weightChartPeriod === 'month' ? 'flex' : 'none';
            renderWeightChart();
          });
        });
        document.getElementById('btnWeightMonthPrev').addEventListener('click', function() {
          weightMonthOffset--;
          updateWeightMonthLabel();
          renderWeightChart();
        });
        document.getElementById('btnWeightMonthNext').addEventListener('click', function() {
          if (weightMonthOffset < 0) {
            weightMonthOffset++;
            updateWeightMonthLabel();
            renderWeightChart();
          }
        });

        ['profileGender', 'profileAge', 'profileWeight', 'profileHeight', 'profileActivity'].forEach(function(id) {
          document.getElementById(id).addEventListener('input', updateBurnDisplay);
          document.getElementById(id).addEventListener('change', updateBurnDisplay);
        });

        var savedUser = getCurrentUser();
        if (savedUser) {
          try {
            await setCurrentUser(savedUser);
            document.getElementById('userPicker').classList.remove('active');
            document.getElementById('appMain').style.display = 'block';
            refresh();
          } catch(e) { await showUserPicker(); }
        } else {
          await showUserPicker();
        }

        setInterval(function() {
          if (document.getElementById('historyView').style.display === 'none') updateDisplay();
        }, 1000);

        var currentDayKey = getDayKey();
        setInterval(async function() {
          var newKey = getDayKey();
          if (newKey !== currentDayKey) {
            currentDayKey = newKey;
            await loadEntries();
            refresh();
          }
        }, 60000);

      } catch (err) {
        var msg = document.getElementById('loadingMsg');
        if (msg) msg.innerHTML = '<span style="color:#e74c3c">Init error: ' + err.message + '</span>';
        console.error('Init failed:', err);
      }
    }

    init();
  })();
  </script>
</body>
</html>
